<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMS AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body {
            min-height: 100vh;
            background: radial-gradient(circle at top left, rgba(47, 128, 237, 0.18), transparent 30%),
                        linear-gradient(180deg, #eef4ff 0%, #f8fbff 100%);
        }
        .dashboard-card {
            border: none;
            border-radius: 1.25rem;
            box-shadow: 0 28px 90px rgba(15, 23, 42, 0.12);
            overflow: hidden;
        }
        .dashboard-header {
            background: linear-gradient(135deg, #2f80ed 0%, #56CCF2 100%);
            color: white;
        }
        .dashboard-header h1 {
            margin-bottom: 0;
            font-size: 2rem;
            letter-spacing: 0.02em;
        }
        .dashboard-header .badge {
            background: rgba(255, 255, 255, 0.18);
            color: #ffffff;
            font-weight: 600;
        }
        .page-section {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            margin-top: 1.5rem;
        }
        .page-section p {
            color: #4a5668;
        }
        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3 {
            margin-top: 1.5rem;
        }
        .markdown-body p {
            line-height: 1.75;
            margin-bottom: 1rem;
        }
        .markdown-body ul,
        .markdown-body ol {
            margin-left: 1.25rem;
        }
        .markdown-body code {
            background: #f4f6fb;
            border-radius: 0.5rem;
            padding: 0.2rem 0.4rem;
            font-size: 0.95rem;
        }
        .form-control {
            min-height: 180px;
            resize: vertical;
            border-radius: 0.85rem;
            border: 1px solid #d8e3f7;
            box-shadow: none;
        }
        .form-label {
            font-weight: 600;
            color: #344767;
        }
        .btn-primary {
            background: #2f80ed;
            border: none;
            box-shadow: 0 12px 28px rgba(47, 128, 237, 0.18);
        }
        .btn-primary:hover {
            background: #1f6fdf;
        }
        .card.border-0.shadow-sm {
            border-radius: 1rem;
        }
        .badge.bg-primary.bg-opacity-10 {
            background-color: rgba(47, 128, 237, 0.12) !important;
            color: #2f80ed !important;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-xl-9">
                <div class="card dashboard-card">
                    <div class="card-body p-0">
                        <div class="dashboard-header px-4 py-4 d-flex align-items-center justify-content-between">
                            <div>
                                <span class="badge bg-white text-primary mb-2">HMS Dashboard</span>
                                <h1 class="mb-0"><i class="bi bi-robot me-2"></i>Chat with HMS AI</h1>
                            </div>
                            <a href="/dashboard" class="btn btn-sm btn-outline-light">
                                <i class="bi bi-arrow-left"></i> Back
                            </a>
                        </div>
                        <div class="page-section">
                            <p class="text-muted">Ask anything about medhaHMS and get intelligent answers in dashboard style.</p>
                            <form method="POST">
                                {% csrf_token %}
                                <div class="mb-4">
                                    <label for="query" class="form-label">Your question</label>
                                    <textarea id="query" name="query" class="form-control" placeholder="Ask any question about HMS..." rows="5"></textarea>
                                </div>
                                <button type="submit" class="btn btn-primary px-4 py-2">
                                    <i class="bi bi-chat-dots me-2"></i>Answer Me
                                </button>
                            </form>

                            {% if answer %}
                            <div class="mt-5">
                                <div class="card border-0 shadow-sm">
                                    <div class="card-body">
                                        <div class="d-flex align-items-center justify-content-between mb-3">
                                            <div>
                                                <h2 class="h5 mb-1">AI Answer</h2>
                                                <p class="text-secondary mb-0">Markdown rendering is enabled for the answer text.</p>
                                            </div>
                                            <span class="badge bg-primary bg-opacity-10 text-primary">Rendered</span>
                                        </div>
                                        <div id="answer-output" class="markdown-body"></div>
                                        <div id="markdown-source" data-answer="{{ answer|escapejs }}" style="display:none;"></div>
                                    </div>
                                </div>
                            </div>
                            {% endif %}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <script>
        const source = document.getElementById('markdown-source');
        const output = document.getElementById('answer-output');
        if (source && output) {
            const raw = source.dataset.answer || '';
            const html = marked.parse(raw || 'No answer generated yet.');
            output.innerHTML = DOMPurify.sanitize(html);
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
