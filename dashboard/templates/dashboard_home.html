<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        .row .col-md-3:nth-child(1) .card { background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%); }
        .row .col-md-3:nth-child(2) .card { background: linear-gradient(135deg, #55efc4 0%, #00b894 100%); }
        .row .col-md-3:nth-child(3) .card { background: linear-gradient(135deg, #ffeaa7 0%, #d63031 100%); }
        .row .col-md-3:nth-child(4) .card { background: linear-gradient(135deg, #fd79a8 0%, #e84393 100%); }
        .card { border: none; color: white; }
        .btn { background: rgba(255,255,255,0.2); border: none; color: white; }
        .btn:hover { background: rgba(255,255,255,0.4); }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Dashboard</h1>
        <div class="row justify-content-center">
            <div class="col-md-3 mb-3">
                <div class="card h-100">
                    <div class="card-body text-center">
                        <a href="/patients" class="btn btn-lg w-100"><i class="bi bi-person-lines-fill me-2"></i>Patients</a>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card h-100">
                    <div class="card-body text-center">
                        <a href="/doctors" class="btn btn-lg w-100"><i class="bi bi-person-badge me-2"></i>Doctors</a>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card h-100">
                    <div class="card-body text-center">
                        <a href="/appointments" class="btn btn-lg w-100"><i class="bi bi-calendar-event me-2"></i>Appointments</a>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card h-100">
                    <div class="card-body text-center">
                        <a href="/logout" class="btn btn-lg w-100"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
