<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Doctor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background: #f4f7fb; }
        .page-card { border: none; border-radius: 1rem; box-shadow: 0 16px 40px rgba(0,0,0,0.08); }
        .page-card .card-header { background: linear-gradient(135deg, #55efc4 0%, #00b894 100%); color: white; border-radius: 1rem 1rem 0 0; }
        .btn-success { background: #00b894; border: none; }
        .btn-success:hover { background: #02996c; }
        .form-control:focus { box-shadow: 0 0 0 0.15rem rgba(0,184,148,0.25); }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card page-card">
                    <div class="card-header text-center py-4">
                        <h2 class="mb-0"><i class="bi bi-pencil-square me-2"></i>create Doctor</h2>
                    </div>
                    <div class="card-body p-4">
                        <form method="POST">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label">Name</label>
                                <input type="text" name="name" class="form-control"  required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">specialization</label>
                                <input type="text" name="specialization" class="form-control"  required>
                            </div>
                            <div class="d-flex justify-content-between align-items-center">
                                <a href="/doctors" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Cancel</a>
                                <button type="submit" class="btn btn-success"><i class="bi bi-check-circle-fill me-1"></i>Save Changes</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
