<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patients</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background: #f4f7fb; }
        .page-header { border-radius: 1rem; background: #ffffff; box-shadow: 0 16px 40px rgba(0,0,0,0.08); }
        .page-header .btn-primary { background: #0984e3; border: none; }
        .page-header .btn-primary:hover { background: #076cbc; }
        .table thead th { border-bottom: 2px solid #dee2e6; }
        .btn-danger { min-width: 80px; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="card page-header p-4 mb-4">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3">
                <div>
                    <h1 class="mb-1">Patients</h1>
                    <p class="text-muted mb-0">Manage your patient records with clean dashboard styling.</p>
                </div>
                <div class="d-flex gap-2">
                    <a href="/dashboard" class="btn btn-outline-secondary"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>
                    <a href="/patients/create" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>New Patient</a>
                </div>
            </div>
        </div>
        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Phone</th>
                                <th class="text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for p in patients %}
                            <tr>
                                <td>{{ p.id }}</td>
                                <td>{{ p.name }}</td>
                                <td>{{ p.phone }}</td>
                                <td class="text-end">
                                    <a href="/patients/{{ p.id }}/edit" class="btn btn-sm btn-primary me-2"><i class="bi bi-pencil-fill"></i></a>
                                    <a href="/patients/{{ p.id }}/delete" class="btn btn-sm btn-danger"><i class="bi bi-trash-fill"></i></a>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
