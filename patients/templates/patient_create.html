<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Patient</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background: #f4f7fb; }
        .page-card { border: none; border-radius: 1rem; box-shadow: 0 16px 40px rgba(0,0,0,0.08); }
        .page-card .card-header { background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%); color: white; border-radius: 1rem 1rem 0 0; }
        .btn-primary { background: #0984e3; border: none; }
        .btn-primary:hover { background: #076cbc; }
        .form-control:focus { box-shadow: 0 0 0 0.15rem rgba(9,132,227,0.25); }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card page-card">
                    <div class="card-header text-center py-4">
                        <h2 class="mb-0"><i class="bi bi-person-plus-fill me-2"></i>Create Patient</h2>
                    </div>
                    <div class="card-body p-4">
                        <form method="POST">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label">Name</label>
                                <input type="text" name="name" class="form-control" placeholder="Enter patient name" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Phone</label>
                                <input type="text" name="phone" class="form-control" placeholder="Enter phone number" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" name="email" class="form-control" placeholder="Enter email address">
                            </div>
                            <div class="d-flex justify-content-between align-items-center">
                                <a href="/patients" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a>
                                <button type="submit" class="btn btn-primary"><i class="bi bi-save-fill me-1"></i>Create Patient</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
